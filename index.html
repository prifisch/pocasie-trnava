<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Počasie v Trnave</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: #1e293b; }
        h3 { margin-top: 0; color: #475569; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        canvas { max-height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Počasie v Trnave</h1>
        
        <div class="card">
            <h3>Vývoj teploty (posledných 24 hodín)</h3>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <h3>Mesačné priemery</h3>
            <div id="monthly-table">Načítavam...</div>
        </div>

        <div class="card">
            <h3>Denné priemery</h3>
            <div id="summary-table">Načítavam...</div>
        </div>
    </div>

    <script>
        // Pomocné pole pre názvy mesiacov
        const monthNames = ["Január", "Február", "Marec", "Apríl", "Máj", "Jún", 
                            "Júl", "August", "September", "Október", "November", "December"];

        fetch('data.csv')
            .then(response => response.text())
            .then(csvData => {
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "");
                const dailyStats = {};
                const monthlyStats = {};
                const chartLabels = [];
                const chartData = [];

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    if (columns.length < 2) continue;

                    const cleanDt = columns[0].replace('T', ' ');
                    const temp = parseFloat(columns[1]);
                    
                    if (isNaN(temp)) continue;

                    const datePart = cleanDt.split(' ')[0]; // YYYY-MM-DD
                    const timePart = cleanDt.includes(' ') ? cleanDt.split(' ')[1].substring(0, 5) : "00:00";
                    const monthPart = datePart.substring(0, 7); // YYYY-MM

                    if (!dailyStats[datePart]) dailyStats[datePart] = { sum: 0, count: 0 };
                    dailyStats[datePart].sum += temp;
                    dailyStats[datePart].count += 1;

                    if (!monthlyStats[monthPart]) monthlyStats[monthPart] = { sum: 0, count: 0 };
                    monthlyStats[monthPart].sum += temp;
                    monthlyStats[monthPart].count += 1;

                    if (i > rows.length - 25) {
                        chartLabels.push(timePart);
                        chartData.push(temp);
                    }
                }

                // Vykreslenie mesačnej tabuľky (Formát: Apríl 2026)
                let mHtml = '<table><tr><th>Mesiac</th><th>Priemer (°C)</th></tr>';
                Object.keys(monthlyStats).sort().reverse().forEach(m => {
                    const [y, mNum] = m.split('-');
                    const name = monthNames[parseInt(mNum) - 1];
                    const avg = (monthlyStats[m].sum / monthlyStats[m].count).toFixed(1);
                    mHtml += `<tr><td>${name} ${y}</td><td>${avg}</td></tr>`;
                });
                document.getElementById('monthly-table').innerHTML = mHtml + '</table>';

                // Vykreslenie dennej tabuľky (Formát: DD.MM.RRRR)
                let dHtml = '<table><tr><th>Dátum</th><th>Priemer (°C)</th></tr>';
                Object.keys(dailyStats).sort().reverse().forEach(d => {
                    const [y, m, day] = d.split('-');
                    const formattedDate = `${day}.${m}.${y}`;
                    const avg = (dailyStats[d].sum / dailyStats[d].count).toFixed(1);
                    dHtml += `<tr><td>${formattedDate}</td><td>${avg}</td></tr>`;
                });
                document.getElementById('summary-table').innerHTML = dHtml + '</table>';

                // Graf
                new Chart(document.getElementById('tempChart'), {
                    type: 'line',
                    data: {
                        labels: chartLabels,
                        datasets: [{ label: 'Teplota (°C)', data: chartData, borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)', fill: true, tension: 0.3 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            })
            .catch(err => {
                console.error("Chyba:", err);
                document.getElementById('summary-table').innerHTML = "Chyba pri načítaní.";
            });
    </script>
</body>
</html>
