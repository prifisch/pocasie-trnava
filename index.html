<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Počasie: Historický prehľad</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --primary: #2563eb; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        h2 { margin-top: 40px; font-size: 20px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Štýl pre výber roku */
        #year-select { width: 100%; padding: 15px; font-size: 16px; border-radius: 12px; border: 2px solid #e2e8f0; background: white; cursor: pointer; margin-bottom: 20px; }
        #year-select:focus { outline: none; border-color: var(--primary); }

        .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
        .card.active { border-color: var(--primary); background: #eff6ff; }
        
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; }
        .card-value { font-size: 20px; color: var(--primary); font-weight: bold; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #f1f5f9; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Historické počasie</h1></header>

    <h2>1. Vyber rok</h2>
    <select id="year-select">
        <option value="">-- Zvoľ rok zo zoznamu --</option>
    </select>

    <div id="months-section" style="display: none;">
        <h2>2. Vyber mesiac</h2>
        <div id="months-container" class="section-grid"></div>
    </div>

    <div id="days-section" style="display: none;">
        <h2>3. Detailné denné priemery</h2>
        <table id="days-table">
            <thead><tr><th>Dátum</th><th>Priemerná teplota</th></tr></thead>
            <tbody id="days-body"></tbody>
        </table>
    </div>
</div>

<script>
    const monthNames = ["Január", "Február", "Marec", "Apríl", "Máj", "Jún", "Júl", "August", "September", "Október", "November", "December"];
    let dataTree = {};

    fetch('weather_daily.csv')
        .then(res => res.text())
        .then(csv => {
            const rows = csv.split('\n').slice(1);
            rows.forEach(row => {
                const cols = row.split(',');
                if (cols.length < 5) return;
                const [y, m, d] = cols[0].split('-');
                const avg = parseFloat(cols[4]);
                
                if (!dataTree[y]) dataTree[y] = { months: {}, temps: [] };
                if (!dataTree[y].months[m]) dataTree[y].months[m] = { days: [], temps: [] };
                
                dataTree[y].months[m].days.push({ d, avg });
                dataTree[y].months[m].temps.push(avg);
                dataTree[y].temps.push(avg);
            });
            initYearDropdown();
        });

    function initYearDropdown() {
        const select = document.getElementById('year-select');
        Object.keys(dataTree).sort().reverse().forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            select.appendChild(option);
        });

        // Event listener pre zmenu výberu
        select.addEventListener('change', (e) => {
            const selectedYear = e.target.value;
            if (selectedYear) {
                renderMonths(selectedYear);
            } else {
                document.getElementById('months-section').style.display = 'none';
                document.getElementById('days-section').style.display = 'none';
            }
        });
    }

    function renderMonths(year) {
        document.getElementById('months-section').style.display = 'block';
        document.getElementById('days-section').style.display = 'none';
        const container = document.getElementById('months-container');
        container.innerHTML = '';
        
        Object.keys(dataTree[year].months).sort().forEach(m => {
            const monthData = dataTree[year].months[m];
            const avg = (monthData.temps.reduce((a, b) => a + b, 0) / monthData.temps.length).toFixed(1);
            
            const card = createCard(monthNames[parseInt(m)-1], `${avg}°C`, () => {
                highlightSelection(container, card);
                renderDays(monthData);
            });
            container.appendChild(card);
        });
    }

    function renderDays(monthData) {
        document.getElementById('days-section').style.display = 'block';
        const body = document.getElementById('days-body');
        body.innerHTML = monthData.days.map(day => `<tr><td>${day.d}</td><td>${day.avg.toFixed(1)}°C</td></tr>`).join('');
    }

    function createCard(title, value, onClick) {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<div class="card-title">${title}</div><div class="card-value">${value}</div>`;
        div.onclick = onClick;
        return div;
    }

    function highlightSelection(container, activeCard) {
        container.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        activeCard.classList.add('active');
    }
</script>

</body>
</html>
